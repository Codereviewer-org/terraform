name: "Terraform - PipelineIQ Infrastructure"

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.15.2"
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  ARM_USE_OIDC: "true"
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  TF_VAR_resource_group_name: ${{ secrets.TF_RESOURCE_GROUP_NAME }}
  TF_VAR_terraform_state_storage_account_name: ${{ secrets.TF_STATE_STORAGE_ACCOUNT_NAME }}
  TF_VAR_alert_email: ${{ secrets.TF_ALERT_EMAIL }}
  TF_VAR_postgresql_administrator_password: ${{ secrets.TF_POSTGRESQL_ADMINISTRATOR_PASSWORD }}
  TF_VAR_vm_admin_password: ${{ secrets.TF_VM_ADMIN_PASSWORD }}
  TF_VAR_admin_source_cidr: ${{ secrets.TF_ADMIN_SOURCE_CIDR }}

defaults:
  run:
    shell: bash
    working-directory: terraform-infrastructure

jobs:
  terraform:
    name: "Terraform"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          allow-no-subscriptions: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Write backend config
        run: |
          cat > backend.ci.hcl <<EOF
          resource_group_name  = "${{ secrets.TF_BACKEND_RESOURCE_GROUP_NAME }}"
          storage_account_name = "${{ secrets.TF_BACKEND_STORAGE_ACCOUNT_NAME }}"
          container_name       = "${{ secrets.TF_BACKEND_CONTAINER_NAME }}"
          key                  = "${{ secrets.TF_BACKEND_STATE_KEY }}"
          use_azuread_auth     = true
          EOF

      - name: Write CI tfvars
        run: |
          cat > ci.auto.tfvars <<EOF
          location                             = "australiaeast"
          environment                          = "prod"
          name_prefix                          = "coderaptor"
          postgresql_administrator_login       = "postgress"
          postgresql_high_availability_enabled = false
          postgresql_sku_name                  = "GP_Standard_D2s_v3"
          system_node_vm_size                  = "Standard_D2s_v3"
          workload_node_vm_size                = "Standard_D2s_v3"
          workload_node_min_count              = 1
          workload_node_max_count              = 3
          availability_zones                   = []
          acr_public_network_access_enabled    = true
          vm_admin_username                    = "azure"
          vm_size                              = "Standard_D2s_v3"
          create_jumpbox_vm                    = true
          EOF

      - name: Terraform init
        run: terraform init -backend-config=backend.ci.hcl -input=false

      - name: Terraform validate
        run: terraform validate -no-color

      - name: Terraform plan
        run: terraform plan -out=tfplan -input=false -no-color

      - name: Terraform apply
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: terraform apply -input=false -auto-approve tfplan
